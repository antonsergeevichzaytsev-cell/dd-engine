name: DD Engine — daily status

on:
  schedule:
    # 06:00 UTC = 09:00 MSK, Mon-Fri
    - cron: "0 6 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  push-status:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send daily DD status
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python bot/daily_status.py
